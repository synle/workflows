# Cleanup Releases
#
# Reusable workflow to clean up GitHub releases. Supports two cleanup modes:
#   1. Draft cleanup:      Deletes old draft releases, keeping the N most recent.
#   2. Incomplete cleanup:  Deletes releases missing expected assets within a lookback window.
#
# Both modes support dry-run to preview deletions before actually removing anything.
# Uses `gh` CLI for all release operations (included in ubuntu-latest runners).
#
# Produces a Job Summary table at the end showing the cleanup configuration and duration.

name: Cleanup Releases

on:
  workflow_call:
    inputs:
      cleanup-drafts:
        description: "Delete old draft releases"
        type: boolean
        required: false
        default: true
      draft-keep-count:
        description: "Number of most recent draft releases to keep"
        type: number
        required: false
        default: 0
      cleanup-incomplete:
        description: "Delete incomplete releases (missing assets)"
        type: boolean
        required: false
        default: true
      expected-assets:
        description: "Expected number of assets per release"
        type: number
        required: false
        default: 4
      lookback-months:
        description: "How many months back to check for incomplete releases"
        type: number
        required: false
        default: 3
      dry-run:
        description: "Preview deletions without actually deleting"
        type: boolean
        required: false
        default: true

jobs:
  cleanup:
    name: Cleanup Releases
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Record Job Start Time
        run: echo "JOB_START=$(date +%s)" >> $GITHUB_ENV

      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Cleanup Old Draft Releases
        if: ${{ inputs.cleanup-drafts }}
        id: cleanup-drafts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          DRY_RUN=${{ inputs.dry-run }}
          echo "Cleaning up old draft releases, keeping the last ${{ inputs.draft-keep-count }}..."
          if [ "$DRY_RUN" = "true" ]; then
            echo "::notice::DRY RUN — no releases will be deleted"
          fi

          gh release list --json tagName,isDraft --limit 100 | \
            jq -r '[.[] | select(.isDraft == true)] | sort_by(.tagName) | reverse | .[${{ inputs.draft-keep-count }}:] | .[].tagName' | \
            while read -r tag; do
              if [ "$DRY_RUN" = "true" ]; then
                echo "Would delete draft: $tag"
              else
                echo "Deleting draft release: $tag"
                gh release delete "$tag" --yes --cleanup-tag || true
              fi
            done

      - name: Cleanup Incomplete Releases
        if: ${{ inputs.cleanup-incomplete }}
        id: cleanup-incomplete
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          EXPECTED=${{ inputs.expected-assets }}
          DRY_RUN=${{ inputs.dry-run }}
          echo "Checking for incomplete releases with < $EXPECTED assets (last ${{ inputs.lookback-months }} months)..."
          if [ "$DRY_RUN" = "true" ]; then
            echo "::notice::DRY RUN — no releases will be deleted"
          fi

          CUTOFF=$(date -u -d '${{ inputs.lookback-months }} months ago' '+%Y-%m-%dT%H:%M:%SZ' 2>/dev/null || date -u -v-${{ inputs.lookback-months }}m '+%Y-%m-%dT%H:%M:%SZ')

          gh release list --json tagName,createdAt --limit 50 | \
            jq -r --arg cutoff "$CUTOFF" '.[] | select(.createdAt >= $cutoff) | .tagName' | \
            while read -r tag; do
              ASSET_COUNT=$(gh release view "$tag" --json assets --jq '.assets | length' 2>/dev/null || echo "0")
              if [ "$ASSET_COUNT" -gt 0 ] && [ "$ASSET_COUNT" -lt "$EXPECTED" ]; then
                if [ "$DRY_RUN" = "true" ]; then
                  echo "Would delete: $tag ($ASSET_COUNT/$EXPECTED assets)"
                else
                  echo "Deleting incomplete release: $tag ($ASSET_COUNT/$EXPECTED assets)"
                  gh release delete "$tag" --yes --cleanup-tag || true
                fi
              fi
            done

      - name: Job Summary
        if: ${{ always() }}
        shell: bash
        run: |
          JOB_END=$(date +%s)
          DUR=$(( JOB_END - ${JOB_START:-$JOB_END} ))
          if [ "$DUR" -ge 60 ]; then FORMATTED=$(printf "%dm %ds" $((DUR / 60)) $((DUR % 60))); else FORMATTED="${DUR}s"; fi

          function get_status_icon() {
            case "$1" in
              success)  echo ":white_check_mark: Passed" ;;
              failure)  echo ":x: Failed" ;;
              skipped)  echo ":fast_forward: Skipped" ;;
              *)        echo ":grey_question: Unknown" ;;
            esac
          }

          echo "## :broom: Cleanup Releases Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Setting | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Dry Run | **${{ inputs.dry-run }}** |" >> $GITHUB_STEP_SUMMARY
          echo "| Cleanup Drafts | $(get_status_icon '${{ steps.cleanup-drafts.outcome }}') (keep last ${{ inputs.draft-keep-count }}) |" >> $GITHUB_STEP_SUMMARY
          echo "| Cleanup Incomplete | $(get_status_icon '${{ steps.cleanup-incomplete.outcome }}') (expect ${{ inputs.expected-assets }} assets, last ${{ inputs.lookback-months }}mo) |" >> $GITHUB_STEP_SUMMARY
          echo "| **Total Duration** | **${FORMATTED}** |" >> $GITHUB_STEP_SUMMARY
